            display: flex;

            flex-direction: column;

            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;

        #pdf-iframe {
            width: 100%;
            flex: 1;
            border: none;
            min-height: 0;

        .download-container {
            text-align: center;
            padding: 1.5rem;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
        
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            padding: 0.7rem 1.5rem;
            border-radius: 4px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        
        .download-btn:hover {
            background: #34495e;
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .cv-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 1.25rem;
            background: #f8f9fa;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border-bottom: 1px solid #e9ecef;
        }

        .cv-btn {
            appearance: none;
            border: 1px solid #2c3e50;
            background: white;
            color: #2c3e50;
            padding: 0.65rem 1rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .cv-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
        }

        .cv-btn.active {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }
        
        @media (max-width: 768px) {
            .resume-container {
                padding: 0.5rem;
            }
        }

    <script>
        (function() {
            const cvFiles = {
                'ai-engineer': 'files/ArashCV-AI.pdf',
                'data-scientist': 'files/ArashCV-DS.pdf',
                'data-analyst': 'files/ArashCV-DA.pdf',
                'deep-learning-engineer': 'files/ArashCV-DL.pdf',
                'data-engineer': 'files/ArashCV-DE.pdf',
                'software-engineer': 'files/ArashCV-SWE.pdf'
            };

            const cvLabels = {
                'ai-engineer': 'AI Engineer',
                'data-scientist': 'Data Scientist',
                'data-analyst': 'Data Analyst',
                'deep-learning-engineer': 'Deep Learning Engineer',
                'data-engineer': 'Data Engineer',
                'software-engineer': 'Software Engineer'
            };

            const buttons = Array.from(document.querySelectorAll('.cv-btn'));
            const iframe = document.getElementById('pdf-iframe');
            const downloadLink = document.getElementById('resume-download');

            const pdfViewerParams = '#toolbar=1&navpanes=0&statusbar=0&view=FitH&zoom=page-width';

            function normalizeCvKey(value) {
                if (!value) return '';
                return String(value).trim().toLowerCase();
            }

            function readCvFromUrl() {
                const url = new URL(window.location.href);
                const fromQuery = normalizeCvKey(url.searchParams.get('cv'));
                const fromHash = normalizeCvKey((window.location.hash || '').replace(/^#/, ''));
                return fromQuery || fromHash;
            }

            function resolveCvKey(candidate) {
                const key = normalizeCvKey(candidate);
                return cvFiles[key] ? key : 'data-scientist';
            }

            function setActiveCv(cvKey, updateUrl) {
                const key = resolveCvKey(cvKey);
                const file = cvFiles[key];

                if (iframe) {
                    iframe.src = file + pdfViewerParams;
                }

                if (downloadLink) {
                    downloadLink.href = file;
                    downloadLink.setAttribute('download', 'ArashCV - ' + (cvLabels[key] || 'Resume') + '.pdf');
                }

                buttons.forEach(btn => {
                    const isActive = btn.dataset.cv === key;
                    btn.classList.toggle('active', isActive);
                    btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
                });

                if (updateUrl) {
                    const url = new URL(window.location.href);
                    url.searchParams.set('cv', key);
                    url.hash = key;
                    window.history.replaceState({}, '', url.toString());
                }
            }

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    setActiveCv(btn.dataset.cv, true);
                });
            });

            setActiveCv(readCvFromUrl(), true);
        })();

        // Add smooth scrolling to all links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
